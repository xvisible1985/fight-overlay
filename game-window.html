<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Дурак</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }

/* Scale container */
#scaleRoot {
  width: 860px; height: 740px;
  background: #0d3320;
  border: 1px solid #1a5c35;
  border-radius: 12px;
  overflow: hidden;
  display: flex; flex-direction: column;
  transform-origin: top left;
  position: absolute; top: 0; left: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #e2e8f0;
}

/* Title bar */
.title-bar { background: #071a10; border-bottom: 1px solid #1a3d20; padding: 8px 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #4ade80; font-weight: 600; flex-shrink: 0; -webkit-app-region: drag; }
.title-bar button, .tb-timer, .tb-info { -webkit-app-region: no-drag; }
.tb-title { flex: 1; }
.tb-timer { background: #451a03; border: 1px solid #f59e0b; border-radius: 4px; padding: 3px 10px; font-size: 12px; color: #f59e0b; font-weight: 700; display: none; }
.tb-timer.active { display: inline-block; }
.tb-info { color: #475569; font-size: 12px; }
.tb-close { background: none; border: none; color: #475569; cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 4px; line-height: 1; }
.tb-close:hover { background: #7f1d1d; color: #fca5a5; }
.tb-leave { background: none; border: 1px solid #7f1d1d; color: #f87171; cursor: pointer; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; line-height: 1; -webkit-app-region: no-drag; }
.tb-leave:hover { background: #7f1d1d; color: #fca5a5; }
.tb-leave:disabled { opacity: .4; cursor: default; }

/* Portrait */
.portrait-wrap { position: relative; flex-shrink: 0; }
.portrait { width: 42px; height: 58px; border-radius: 5px; overflow: hidden; border: 2px solid rgba(255,255,255,.1); flex-shrink: 0; background: #0f2440; display: flex; align-items: center; justify-content: center; }
.portrait img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
.portrait.attacker { border-color: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,.3); }
.portrait.defender { border-color: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,.3); }
.portrait.me { border-color: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,.3); }
.portrait-role {
  position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
  font-size: 8px; font-weight: 700; letter-spacing: .03em; white-space: nowrap;
  padding: 1px 5px; border-radius: 3px; pointer-events: none;
}
.portrait-role.atk { background: #ef4444; color: #fff; }
.portrait-role.def { background: #3b82f6; color: #fff; }
.portrait-role.wait { background: rgba(71,85,105,.7); color: #94a3b8; }
.sil { width: 26px; height: 34px; opacity: .3; }

/* Opponents */
.opponents-area { display: flex; justify-content: space-around; gap: 10px; padding: 12px 16px 8px; flex-shrink: 0; }
.player-slot { display: flex; flex-direction: row; align-items: center; gap: 10px; background: rgba(0,0,0,.25); border: 1px solid rgba(255,255,255,.07); border-radius: 9px; padding: 8px 14px; flex: 1; position: relative; transition: border-color .2s; min-width: 0; }
.player-slot.attacker { border-color: #ef4444; background: rgba(239,68,68,.08); }
.player-slot.defender { border-color: #3b82f6; background: rgba(59,130,246,.08); }
.player-slot.exited { opacity: .35; }
.player-slot.disconnected { opacity: .5; }
.ps-info { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
.ps-name { font-size: 13px; font-weight: 700; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ps-role { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: .06em; }
.ps-role.atk { color: #f87171; }
.ps-role.def { color: #60a5fa; }
.ps-cards { display: flex; overflow: hidden; }
.card-back { width: 22px; height: 32px; background: linear-gradient(135deg,#1e3a5f,#0f2440); border: 1px solid #334155; border-radius: 3px; margin-left: -6px; flex-shrink: 0; }
.card-back:first-child { margin-left: 0; }
.ps-timer { position: absolute; top: 6px; right: 10px; font-size: 12px; font-weight: 700; color: #f59e0b; }
.ps-cardcount { font-size: 12px; color: #64748b; font-weight: 700; }

/* Compact mode: 4-5 opponents */
.opponents-area.compact { gap: 6px; padding: 8px 10px 6px; }
.opponents-area.compact .player-slot { padding: 5px 10px; gap: 7px; }
.opponents-area.compact .portrait { width: 30px !important; height: 42px !important; }
.opponents-area.compact .sil { width: 18px; height: 24px; }
.opponents-area.compact .ps-name { font-size: 11px; }
.opponents-area.compact .ps-role { font-size: 9px; letter-spacing: 0; }
.opponents-area.compact .ps-timer { font-size: 10px; top: 4px; right: 6px; }
.opponents-area.compact .ps-cards { display: none; }

/* Table */
.table-center { background: #0a2d18; border: 1px solid #1a5c35; border-radius: 12px; flex: 1; margin: 4px 16px; display: flex; align-items: center; padding: 14px 18px; gap: 18px; position: relative; min-height: 120px; }
.table-label { position: absolute; top: 7px; left: 12px; font-size: 10px; color: #1a5c35; text-transform: uppercase; letter-spacing: .08em; }
.pairs-area { display: flex; gap: 14px; flex: 1; align-items: center; justify-content: center; flex-wrap: wrap; }
.attack-pair { position: relative; width: 62px; height: 90px; flex-shrink: 0; }

/* Cards */
.card { position: absolute; width: 56px; height: 78px; border-radius: 6px; border: 1px solid rgba(255,255,255,.15); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; box-shadow: 0 3px 10px rgba(0,0,0,.5); cursor: default; user-select: none; }
.card.red { background: #fef2f2; color: #dc2626; }
.card.black { background: #f8fafc; color: #1e293b; }
.card.clickable { cursor: pointer; transition: transform .12s; }
.card.clickable:hover { transform: translateY(-8px); }
.card.selected { outline: 2px solid #f59e0b !important; transform: translateY(-10px); }
.card-rank { position: absolute; top: 4px; left: 5px; font-size: 11px; font-weight: 800; line-height: 1; }
.card-suit { font-size: 18px; line-height: 1; }
.card-rank-br { position: absolute; bottom: 4px; right: 5px; font-size: 11px; font-weight: 800; line-height: 1; transform: rotate(180deg); }
.attack-card-pos { top: 0; left: 0; }
.defend-card-pos { top: 12px; left: 8px; transform: rotate(12deg); }
.defend-card-pos.selected { transform: rotate(12deg) translateY(-8px); }

/* Trump + deck */
.trump-area { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-left: auto; }
.trump-card-wrap { position: relative; width: 50px; height: 70px; }
.trump-card { position: absolute; width: 50px; height: 70px; border-radius: 5px; border: 1px solid rgba(255,255,255,.15); display: flex; align-items: center; justify-content: center; flex-direction: column; box-shadow: 0 2px 10px rgba(0,0,0,.5); }
.deck-stack { position: absolute; top: -4px; left: -4px; width: 50px; height: 70px; background: linear-gradient(135deg,#1e3a5f,#0f2440); border: 1px solid #334155; border-radius: 5px; }
.trump-label { font-size: 9px; color: #4ade80; text-transform: uppercase; letter-spacing: .06em; }
.deck-count { font-size: 11px; color: #475569; }
.discard-pile { width: 50px; height: 70px; background: rgba(0,0,0,.3); border: 1px dashed #1a5c35; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #1a5c35; }
.discard-count { font-size: 10px; color: #334155; }

/* Hand row */
.hand-row { display: flex; align-items: flex-start; padding: 6px 16px 10px; gap: 14px; flex-shrink: 0; }
.my-portrait-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
.my-name { font-size: 11px; color: #4ade80; font-weight: 700; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.my-role-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; text-align: center; }
.my-role-badge.atk { color: #f87171; }
.my-role-badge.def { color: #60a5fa; }
.my-role-badge.wait { color: #475569; }
.status-msg { font-size: 10px; color: #64748b; text-align: center; line-height: 1.3; max-width: 62px; word-break: break-word; }
.bet-info { font-size: 12px; color: #f59e0b; font-weight: 700; white-space: nowrap; position: absolute; right: 0; }
.hand-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.hand-label { font-size: 10px; color: #1a5c35; text-transform: uppercase; letter-spacing: .06em; }
.my-hand-scroll { flex: 1; min-height: 100px; overflow-x: auto; overflow-y: hidden; padding-top: 16px; }
.my-hand { display: flex; justify-content: safe center; align-items: flex-end; min-width: 100%; }

/* Resize handle */
.resize-br { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; background: linear-gradient(135deg, transparent 50%, #1a5c35 50%); opacity: .5; border-radius: 0 0 12px 0; -webkit-app-region: no-drag; }
.resize-br:hover { opacity: 1; }

/* Game chat */
.game-chat { flex-shrink: 0; display: flex; flex-direction: column; border-top: 1px solid #1a3d20; background: #071a10; height: 160px; transition: height .18s ease; overflow: hidden; }
.game-chat.collapsed { height: 24px; }
.game-chat.collapsed .gc-msgs,
.game-chat.collapsed .gc-row { display: none; }
.gc-header { display: flex; align-items: center; gap: 6px; padding: 3px 8px; border-bottom: 1px solid #0d2010; flex-shrink: 0; height: 24px; }
.gc-header-title { font-size: 10px; color: #1a5c35; text-transform: uppercase; letter-spacing: .06em; flex: 1; }
.gc-unread-badge { background: #ef4444; color: #fff; font-size: 9px; font-weight: 700; border-radius: 8px; padding: 1px 5px; line-height: 1.4; display: none; }
.gc-collapse-btn { background: none; border: none; color: #334155; cursor: pointer; font-size: 11px; padding: 0 2px; line-height: 1; }
.gc-collapse-btn:hover { color: #4ade80; }
.gc-msgs { flex: 1; overflow-y: auto; padding: 4px 10px; display: flex; flex-direction: column; gap: 1px; }
.gc-msgs::-webkit-scrollbar { width: 3px; }
.gc-msgs::-webkit-scrollbar-thumb { background: #1a5c35; border-radius: 2px; }
.gc-msg { font-size: 11px; color: #94a3b8; line-height: 1.4; word-break: break-word; }
.gc-msg .gc-ts { color: #334155; font-size: 9px; margin-right: 4px; }
.gc-msg .gc-name { font-weight: 700; color: #4ade80; }
.gc-msg .gc-name.me { color: #60a5fa; }
.gc-msg.rp { color: #c084fc; font-style: italic; }
.gc-msg.rp .gc-name { color: #a855f7; }
.gc-msg.do-msg { color: #c084fc; font-style: italic; }
.gc-msg.try-msg { color: #94a3b8; }
.gc-msg .gc-success { color: #4ade80; }
.gc-msg .gc-fail { color: #f87171; }
.gc-row { display: flex; align-items: center; gap: 5px; padding: 3px 8px 4px; border-top: 1px solid #0d2010; flex-shrink: 0; }
.gc-input { flex: 1; background: rgba(74,222,128,.06); border: 1px solid #1a3d20; border-radius: 4px; color: #e2e8f0; font-size: 11px; padding: 4px 7px; outline: none; font-family: inherit; resize: none; height: 22px; line-height: 14px; }
.gc-input:focus { border-color: #2d6a35; }
.gc-send { background: #1a3d20; border: 1px solid #2d6a35; border-radius: 4px; color: #4ade80; font-size: 13px; font-weight: 700; padding: 2px 9px; cursor: pointer; line-height: 18px; }
.gc-send:hover { background: #14532d; }
.gc-cmd-btns { display: flex; gap: 2px; }
.gc-cmd { background: none; border: 1px solid #1a3d20; border-radius: 3px; color: #475569; font-size: 9px; font-weight: 700; cursor: pointer; padding: 2px 5px; line-height: 1; }
.gc-cmd:hover, .gc-cmd.active { border-color: #a855f7; color: #c084fc; background: rgba(168,85,247,.1); }
.hand-card { width: 56px; height: 78px; border-radius: 6px; border: 1px solid rgba(255,255,255,.15); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; box-shadow: 0 3px 10px rgba(0,0,0,.5); margin-left: -18px; cursor: pointer; transition: transform .12s; position: relative; user-select: none; }
.hand-card:first-child { margin-left: 0; }
.hand-card:hover { transform: translateY(-10px); }
.hand-card.selected { transform: translateY(-14px); outline: 2px solid #f59e0b; z-index: 10; }
.hand-card.red { background: #fef2f2; color: #dc2626; }
.hand-card.black { background: #f8fafc; color: #1e293b; }
.hand-card.dim { filter: grayscale(1) brightness(0.45); cursor: default; pointer-events: none; }

/* Buttons under hand */
.hand-btns { display: flex; align-items: center; justify-content: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; padding-top: 4px; position: relative; }
.btn { background: #1a3d20; border: 1px solid #2d6a35; border-radius: 6px; color: #4ade80; font-size: 13px; font-weight: 700; padding: 7px 16px; cursor: pointer; white-space: nowrap; }
.btn.primary { background: #14532d; border-color: #22c55e; }
.btn.danger { background: #450a0a; border-color: #ef4444; color: #f87171; }
.btn:disabled { opacity: .35; cursor: default; }

/* End screen */
#endScreen { display: none; position: absolute; inset: 0; background: rgba(0,0,0,.85); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
#endScreen.show { display: flex; }
.end-box { background: #0d3320; border: 1px solid #1a5c35; border-radius: 12px; padding: 24px 32px; min-width: 340px; }
.end-title { font-size: 18px; font-weight: 700; color: #4ade80; text-align: center; margin-bottom: 16px; }
.end-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #0a2d18; }
.end-place { font-size: 22px; width: 36px; text-align: center; }
.end-name { flex: 1; font-size: 14px; color: #94a3b8; font-weight: 600; }
.end-payout { font-size: 14px; color: #f59e0b; font-weight: 700; }
.end-close { margin-top: 16px; width: 100%; }
</style>
</head>
<body>
<div id="scaleRoot">
  <div class="title-bar">
    <span class="tb-title" id="tbTitle">Дурак</span>
    <span class="tb-timer" id="tbTimer"></span>
    <span class="tb-info" id="tbInfo"></span>
    <button class="tb-leave" id="btnLeave" onclick="leaveTable()" title="Покинуть стол и закрыть">Покинуть</button>
    <button class="tb-close" onclick="window.gameAPI?.closeWindow()" title="Закрыть (без выхода со стола)">✕</button>
  </div>
  <div class="opponents-area" id="opponentsArea"></div>
  <div class="table-center" id="tableCenter">
    <div class="table-label">Стол</div>
    <div class="pairs-area" id="pairsArea"></div>
    <div class="trump-area" id="trumpArea"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px" id="discardArea"></div>
  </div>
  <div class="hand-row">
    <div class="my-portrait-wrap">
      <div class="portrait-wrap">
        <div class="portrait me" id="myPortrait" style="width:48px;height:66px"></div>
        <span class="portrait-role wait" id="myRoleTag"></span>
      </div>
      <div class="my-name" id="myName"></div>
      <div class="my-role-badge" id="myRoleBadge"></div>
      <div class="status-msg" id="statusMsg">Подключение…</div>
    </div>
    <div class="hand-col">
      <div class="hand-label" id="handLabel">Моя рука</div>
      <div class="my-hand-scroll">
        <div class="my-hand" id="myHand"></div>
      </div>
      <div class="hand-btns">
        <button class="btn primary" id="btnAction" disabled onclick="doAction()"></button>
        <button class="btn" id="btnSecondary" disabled onclick="doSecondary()"></button>
        <button class="btn danger" id="btnTake" style="display:none" onclick="doTake()">Взять</button>
        <div class="bet-info" id="betInfo"></div>
      </div>
    </div>
  </div>
  <!-- Game chat -->
  <div class="game-chat" id="gameChat">
    <div class="gc-header">
      <span class="gc-header-title">💬 Чат</span>
      <span class="gc-unread-badge" id="gcUnreadBadge"></span>
      <button class="gc-collapse-btn" id="gcCollapseBtn" onclick="gcToggleCollapse()" title="Свернуть/развернуть">▲</button>
    </div>
    <div class="gc-msgs" id="gcMsgs"></div>
    <div class="gc-row">
      <div class="gc-cmd-btns">
        <button class="gc-cmd" id="gcBtnMe" onclick="gcPrependCmd('/me ')" title="/me — действие">/me</button>
        <button class="gc-cmd" id="gcBtnDo" onclick="gcPrependCmd('/do ')" title="/do — описание">/do</button>
        <button class="gc-cmd" id="gcBtnTry" onclick="gcPrependCmd('/try ')" title="/try — бросок">/try</button>
      </div>
      <input class="gc-input" id="gcInput" placeholder="Написать... (Enter — отправить)"
        onkeydown="gcKeyDown(event)" oninput="gcUpdateCmdBtns()"/>
      <button class="gc-send" onclick="gcSend()">→</button>
    </div>
  </div>
  <div class="resize-br" onmousedown="window.gameAPI?.startResizing()"></div>
  <div id="endScreen">
    <div class="end-box">
      <div class="end-title">Игра окончена</div>
      <div id="endResults"></div>
      <button class="btn primary end-close" onclick="window.close()">Закрыть</button>
    </div>
  </div>
</div>
<script>
const p = new URLSearchParams(location.search)
const tableId = p.get('tableId') || ''
const token   = p.get('token') || ''
const srv     = p.get('srv') || 'https://nordheimunion.ru'

const BASE_W = 860, BASE_H = 740
const root = document.getElementById('scaleRoot')
new ResizeObserver(() => {
  const s = Math.min(document.body.clientWidth / BASE_W, document.body.clientHeight / BASE_H)
  root.style.transform = `scale(${s})`
}).observe(document.body)

let state = null
let myUserId = null
let selectedHandCards = []  // array; multi-select in attack phase, single otherwise
let selectedAttackCard = null
let timerInterval = null
let lastActivitySent = 0
let _leaving = false

async function leaveTable() {
  if (_leaving) return
  _leaving = true
  const btn = document.getElementById('btnLeave')
  if (btn) { btn.disabled = true; btn.textContent = '…' }
  try {
    await fetch(`${srv}/api/games/tables/${tableId}/leave`, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    })
  } catch {}
  window.gameAPI?.disconnect()
  window.gameAPI?.closeWindow()
}

function sendDefenderActivity() {
  const now = Date.now()
  if (now - lastActivitySent < 4000) return
  lastActivitySent = now
  window.gameAPI.sendAction('defender_activity')
}

const suit = s => ({'♠':'black','♣':'black','♥':'red','♦':'red'}[s] || 'black')
const RANKS = ['6','7','8','9','10','J','Q','K','A']
function canBeat(atk, def, trump) {
  if (atk.suit === def.suit) return RANKS.indexOf(def.rank) > RANKS.indexOf(atk.rank)
  return def.suit === trump && atk.suit !== trump
}

function cardHTML(card) {
  return `<span class="card-rank">${card.rank}</span><span class="card-suit">${card.suit}</span><span class="card-rank-br">${card.rank}</span>`
}

function renderPortrait(player) {
  if (player.avatar_url) {
    return `<img src="${srv}${player.avatar_url}" onerror="this.parentNode.innerHTML=sil('${player.gender}')">`
  }
  return sil(player.gender)
}

function sil(gender) {
  if (gender === 'female') {
    return `<svg viewBox="0 0 24 32" fill="#94a3b8" style="width:26px;height:34px;opacity:.3"><ellipse cx="12" cy="8" rx="5" ry="6"/><path d="M3 28 Q4 17 12 17 Q20 17 21 28Z"/><path d="M7 22 Q12 26 17 22 Q15 29 9 29Z" opacity=".6"/></svg>`
  }
  return `<svg viewBox="0 0 24 32" fill="#94a3b8" style="width:26px;height:34px;opacity:.3"><ellipse cx="12" cy="8" rx="5" ry="6"/><path d="M3 28 Q4 18 12 18 Q20 18 21 28Z"/></svg>`
}

function updateMyRole() {
  if (!state) return
  const myIdx = state.players.findIndex(p => p.user_id === myUserId)
  const isAtk = myIdx === state.attackerIdx
  const isDef = myIdx === state.defenderIdx
  const badge = document.getElementById('myRoleBadge')
  const portrait = document.getElementById('myPortrait')
  const roleTag = document.getElementById('myRoleTag')
  if (badge) {
    if (isAtk) { badge.textContent = 'Атакует'; badge.className = 'my-role-badge atk' }
    else if (isDef) { badge.textContent = 'Отбивается'; badge.className = 'my-role-badge def' }
    else { badge.textContent = 'Ждёт'; badge.className = 'my-role-badge wait' }
  }
  if (roleTag) {
    if (isAtk) { roleTag.textContent = 'Атакует'; roleTag.className = 'portrait-role atk' }
    else if (isDef) { roleTag.textContent = 'Отбивается'; roleTag.className = 'portrait-role def' }
    else { roleTag.textContent = 'Ждёт'; roleTag.className = 'portrait-role wait' }
  }
  if (portrait) {
    portrait.className = 'portrait me' + (isAtk ? ' attacker' : isDef ? ' defender' : '')
  }
}

function roleLabel(player) {
  if (!state) return ''
  const aIdx = state.attackerIdx, dIdx = state.defenderIdx
  const idx = state.players.findIndex(p => p.user_id === player.user_id)
  if (state.exits.find(e => e.user_id === player.user_id)) return 'Вышел'
  if (!player.connected) return 'Отключён'
  if (idx === aIdx) return '<span class="ps-role atk">Атакует</span>'
  if (idx === dIdx) return '<span class="ps-role def">Защищается</span>'
  return '<span class="ps-role">Ждёт</span>'
}

function isThrowWindowActive() {
  return !!(state?.throwWindowEndsAt && state.throwWindowEndsAt > Date.now())
}

function removeCardFromHand(card) {
  if (!state?.myHand) return
  const i = state.myHand.findIndex(c => c.rank === card.rank && c.suit === card.suit)
  if (i !== -1) state.myHand.splice(i, 1)
}

function renderOpponents() {
  if (!state) return
  const area = document.getElementById('opponentsArea')
  const others = state.players.filter(p => p.user_id !== myUserId)
  const compact = others.length >= 4
  area.className = 'opponents-area' + (compact ? ' compact' : '')
  area.innerHTML = others.map(player => {
    const aIdx = state.attackerIdx, dIdx = state.defenderIdx
    const idx = state.players.findIndex(p => p.user_id === player.user_id)
    const isAtk = idx === aIdx, isDef = idx === dIdx
    const exited = state.exits.find(e => e.user_id === player.user_id)
    const disc = !player.connected
    const cls = `player-slot${isAtk?' attacker':isDef?' defender':''}${exited?' exited':''}${disc?' disconnected':''}`
    const pCls = `portrait${isAtk?' attacker':isDef?' defender':''}`
    const roleTag = exited ? '' : isAtk
      ? `<span class="portrait-role atk">Атакует</span>`
      : isDef ? `<span class="portrait-role def">Отбивается</span>`
      : `<span class="portrait-role wait">Ждёт</span>`
    const cardsEl = compact
      ? `<div class="ps-cardcount">🂠 ${player.cardCount}</div>`
      : `<div class="ps-cards">${Array.from({length: player.cardCount}, () => '<div class="card-back"></div>').join('')}</div>`
    const timer = state.timerEndsAt && (isDef && state.phase === 'defense')
      ? `<span class="ps-timer" data-uid="${player.user_id}"></span>` : ''
    return `<div class="${cls}">${timer}<div class="portrait-wrap"><div class="${pCls}">${renderPortrait(player)}</div>${roleTag}</div><div class="ps-info"><div class="ps-name">${player.game_name}</div>${cardsEl}</div></div>`
  }).join('')
}

function renderTable() {
  if (!state) return
  const pairs = document.getElementById('pairsArea')
  pairs.innerHTML = state.table.map((pair, i) => {
    const ac = pair.attack, dc = pair.defend
    const acEl = `<div class="card ${suit(ac.suit)} attack-card-pos" data-pair="${i}" data-role="attack">${cardHTML(ac)}</div>`
    const dcEl = dc ? `<div class="card ${suit(dc.suit)} defend-card-pos">${cardHTML(dc)}</div>` : ''
    return `<div class="attack-pair">${acEl}${dcEl}</div>`
  }).join('')

  const trumpArea = document.getElementById('trumpArea')
  if (state.trumpCard) {
    trumpArea.innerHTML = `
      <div class="trump-card-wrap">
        ${state.deckCount > 1 ? '<div class="deck-stack"></div>' : ''}
        <div class="trump-card ${suit(state.trumpCard.suit)}">${cardHTML(state.trumpCard)}</div>
      </div>
      <div class="trump-label">Козырь ${state.trump}</div>
      <div class="deck-count">${state.deckCount}</div>`
  } else {
    trumpArea.innerHTML = `<div class="trump-label">Козырь ${state.trump}</div><div class="deck-count">Колода: 0</div>`
  }

  document.getElementById('discardArea').innerHTML = `
    <div class="discard-pile">сброс</div>
    <div class="discard-count">Сброс: ${state.discardCount}</div>`
}

function renderHand() {
  if (!state) return
  const hand = state.myHand || []
  const myIdx = state.players.findIndex(p => p.user_id === myUserId)
  const isAttacker = myIdx === state.attackerIdx
  const isDefender = myIdx === state.defenderIdx
  const phase = state.phase
  const throwWindowActive = isThrowWindowActive()

  const canPlay = (phase === 'attack' && isAttacker) ||
                  (phase === 'defense' && isDefender) ||
                  (phase === 'defense' && !isDefender) ||
                  (phase === 'throw' && !isDefender)

  const firstSel = selectedHandCards[0]
  const handEl = document.getElementById('myHand')
  handEl.innerHTML = hand.map((card, i) => {
    const isSel = selectedHandCards.some(c => c.rank === card.rank && c.suit === card.suit)
    let shouldDim = !canPlay
    if (!shouldDim) {
      if (phase === 'attack' && isAttacker && firstSel && card.rank !== firstSel.rank && !isSel)
        shouldDim = true
      // В защите: если выбрана карта атаки, затемняем карты которые не могут её побить
      if (phase === 'defense' && isDefender && selectedAttackCard &&
          !canBeat(selectedAttackCard, card, state.trump) && !isSel)
        shouldDim = true
    }
    const sel = isSel ? ' selected' : ''
    const dim = shouldDim ? ' dim' : ''
    return `<div class="hand-card ${suit(card.suit)}${sel}${dim}" data-i="${i}" onclick="selectHandCard(${i})">${cardHTML(card)}</div>`
  }).join('')

  updateTimer()
  updateButtons()
}

function selectHandCard(i) {
  const card = state?.myHand?.[i]
  if (!card) return
  const myIdx = state.players.findIndex(p => p.user_id === myUserId)
  const isAttacker = myIdx === state.attackerIdx
  const isDefender = myIdx === state.defenderIdx
  const phase = state.phase
  const throwWindowActive = isThrowWindowActive()

  if (phase === 'attack' && isAttacker) {
    const idx = selectedHandCards.findIndex(c => c.rank === card.rank && c.suit === card.suit)
    if (idx !== -1) {
      selectedHandCards.splice(idx, 1)
    } else if (selectedHandCards.length === 0 || card.rank === selectedHandCards[0].rank) {
      selectedHandCards.push(card)
    }
  } else if (phase === 'defense' && isDefender) {
    const isSel = selectedHandCards[0]?.rank === card.rank && selectedHandCards[0]?.suit === card.suit
    if (selectedAttackCard && canBeat(selectedAttackCard, card, state.trump)) {
      selectedHandCards = isSel ? [] : [card]
    } else if (!selectedAttackCard) {
      selectedHandCards = isSel ? [] : [card]
    }
    sendDefenderActivity()
  } else if ((phase === 'defense' && !isDefender) || (phase === 'throw' && !isDefender)) {
    const isSel = selectedHandCards[0]?.rank === card.rank && selectedHandCards[0]?.suit === card.suit
    selectedHandCards = isSel ? [] : [card]
  }
  renderHand()
  updateButtons()
}

function updateButtons() {
  if (!state) return
  const myIdx = state.players.findIndex(p => p.user_id === myUserId)
  const isAttacker = myIdx === state.attackerIdx
  const isDefender = myIdx === state.defenderIdx
  const phase = state.phase
  const throwWindowActive = isThrowWindowActive()
  const card = selectedHandCards[0]

  const btnAction = document.getElementById('btnAction')
  const btnSec    = document.getElementById('btnSecondary')
  const btnTake   = document.getElementById('btnTake')
  const statusEl  = document.getElementById('statusMsg')

  btnTake.style.display = 'none'
  btnTake.disabled = false

  if (phase === 'attack' && isAttacker) {
    btnAction.textContent = 'Атаковать'; btnAction.disabled = selectedHandCards.length === 0
    btnSec.textContent = ''; btnSec.disabled = true
    statusEl.textContent = 'Ваш ход'
  } else if (phase === 'defense' && isDefender) {
    const canDefend = !!(selectedAttackCard && card && canBeat(selectedAttackCard, card, state.trump))
    btnAction.textContent = 'Отбить'; btnAction.disabled = !canDefend
    btnTake.style.display = 'inline-block'
    btnTake.disabled = throwWindowActive
    if (throwWindowActive) {
      const secs = Math.max(0, Math.ceil((state.throwWindowEndsAt - Date.now()) / 1000))
      btnTake.textContent = secs > 0 ? `Взять (${secs}с)` : 'Взять'
    } else {
      btnTake.textContent = 'Взять'
    }
    if (state.gameType === 'transfer' && state.table.every(pair => !pair.defend)) {
      btnSec.textContent = 'Перевести'; btnSec.disabled = !card
    } else {
      btnSec.textContent = ''; btnSec.disabled = true
    }
    if (!selectedAttackCard) statusEl.textContent = 'Выберите карту на столе'
    else if (!card) statusEl.textContent = 'Выберите карту из руки'
    else statusEl.textContent = canDefend ? 'Нажмите Отбить' : 'Карта не побивает'
  } else if ((phase === 'defense' && !isDefender) || (phase === 'throw' && !isDefender)) {
    btnAction.textContent = card ? `Подкинуть ${card.suit}${card.rank}` : 'Подкинуть'
    btnAction.disabled = !card
    if (isAttacker) {
      if (throwWindowActive && phase === 'throw') {
        const secs = Math.max(0, Math.ceil((state.throwWindowEndsAt - Date.now()) / 1000))
        btnSec.textContent = `Бито (${secs}с)`
        btnSec.disabled = true
      } else {
        btnSec.textContent = 'Бито'
        btnSec.disabled = phase !== 'throw'
      }
      statusEl.textContent = phase === 'throw' ? 'Подкиньте или завершите' : 'Можно подкинуть'
    } else if (phase === 'throw') {
      btnSec.textContent = 'Пас'; btnSec.disabled = false
      statusEl.textContent = 'Можно подкинуть'
    } else {
      btnSec.textContent = ''; btnSec.disabled = true
      statusEl.textContent = 'Можно подкинуть'
    }
  } else {
    btnAction.textContent = '—'; btnAction.disabled = true
    btnSec.textContent = ''; btnSec.disabled = true
    const defName = state.players[state.defenderIdx]?.game_name
    statusEl.textContent = `${defName} защищается`
  }
}

function doAction() {
  if (!state) return
  const myIdx = state.players.findIndex(p => p.user_id === myUserId)
  const isAttacker = myIdx === state.attackerIdx
  const isDefender = myIdx === state.defenderIdx
  const phase = state.phase
  const card = selectedHandCards[0]

  if (phase === 'attack' && isAttacker && selectedHandCards.length > 0) {
    window.gameAPI.sendAction('attack', { cards: [...selectedHandCards] })
  } else if (phase === 'defense' && isDefender && selectedAttackCard && card && canBeat(selectedAttackCard, card, state.trump)) {
    window.gameAPI.sendAction('defend', { attack_card: selectedAttackCard, defend_card: card })
    document.querySelectorAll('[data-role="attack"]').forEach(c => c.classList.remove('selected'))
  } else if ((phase === 'defense' && !isDefender) || (phase === 'throw' && !isDefender)) {
    if (card) window.gameAPI.sendAction('throw_in', { card })
  }
  selectedHandCards = []; selectedAttackCard = null
  renderHand()
}

function doSecondary() {
  if (!state) return
  const myIdx = state.players.findIndex(p => p.user_id === myUserId)
  const phase = state.phase
  const card = selectedHandCards[0]
  if (phase === 'throw' && myIdx !== state.defenderIdx) {
    window.gameAPI.sendAction('pass')
  } else if (phase === 'defense' && myIdx === state.defenderIdx && state.gameType === 'transfer' && card) {
    window.gameAPI.sendAction('transfer', { card })
    selectedHandCards = []
    renderHand()
  }
}

function doTake() {
  if (isThrowWindowActive()) return
  window.gameAPI.sendAction('take')
  selectedHandCards = []; selectedAttackCard = null
  renderHand()
}

document.addEventListener('mousemove', () => {
  if (!state || state.phase !== 'defense') return
  const myIdx = state.players.findIndex(p => p.user_id === myUserId)
  if (myIdx !== state.defenderIdx) return
  sendDefenderActivity()
})

document.getElementById('pairsArea').addEventListener('click', e => {
  const el = e.target.closest('[data-role="attack"]')
  if (!el) return
  const myIdx = state?.players.findIndex(p => p.user_id === myUserId)
  if (!state || state.phase !== 'defense' || myIdx !== state.defenderIdx) return
  const pairIdx = parseInt(el.dataset.pair)
  const pair = state.table[pairIdx]
  if (!pair || pair.defend) return
  selectedAttackCard = pair.attack
  selectedHandCards = []
  document.querySelectorAll('[data-role="attack"]').forEach(c => c.classList.remove('selected'))
  el.classList.add('selected')
  sendDefenderActivity()
  renderHand()
})

function updateTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null }
  const tbTimer = document.getElementById('tbTimer')
  if (!state) { tbTimer.classList.remove('active'); return }

  const myIdx = state.players.findIndex(p => p.user_id === myUserId)
  const isAtk = myIdx === state.attackerIdx
  const isDef = myIdx === state.defenderIdx
  const hasDefTimer = !!(state.timerEndsAt && state.phase === 'defense')
  const hasThrowWin = !!(state.throwWindowEndsAt && state.throwWindowEndsAt > Date.now() && isAtk && state.phase === 'throw')
  const hasDefThrowWin = !!(state.throwWindowEndsAt && state.throwWindowEndsAt > Date.now() && isDef && state.phase === 'defense')

  if (!hasDefTimer && !hasThrowWin && !hasDefThrowWin) { tbTimer.classList.remove('active'); return }

  function tick() {
    if (!state) return
    // Title bar: defender's 30s turn timer
    if (state.timerEndsAt && state.phase === 'defense') {
      const secs = Math.max(0, Math.ceil((state.timerEndsAt - Date.now()) / 1000))
      tbTimer.textContent = `${secs}с`
      tbTimer.classList.toggle('active', secs > 0)
    } else {
      tbTimer.classList.remove('active')
    }
    const myIdx2 = state.players.findIndex(p => p.user_id === myUserId)
    // Взять button: throw window countdown (defender, defense phase)
    if (myIdx2 === state.defenderIdx && state.throwWindowEndsAt && state.phase === 'defense') {
      const secs = Math.max(0, Math.ceil((state.throwWindowEndsAt - Date.now()) / 1000))
      const btnTakeEl = document.getElementById('btnTake')
      if (secs > 0) {
        btnTakeEl.textContent = `Взять (${secs}с)`
      } else {
        state.throwWindowEndsAt = null
        btnTakeEl.textContent = 'Взять'
        btnTakeEl.disabled = false
      }
    }
    // Бито button: throw window countdown (attacker only)
    if (myIdx2 === state.attackerIdx && state.throwWindowEndsAt && state.phase === 'throw') {
      const secs = Math.max(0, Math.ceil((state.throwWindowEndsAt - Date.now()) / 1000))
      const btnSec = document.getElementById('btnSecondary')
      if (secs > 0) {
        btnSec.textContent = `Бито (${secs}с)`
        btnSec.disabled = true
      } else {
        state.throwWindowEndsAt = null
        clearInterval(timerInterval); timerInterval = null
        tbTimer.classList.remove('active')
        updateButtons()
        renderHand()
        return
      }
    }
  }
  tick()
  timerInterval = setInterval(tick, 500)
}

function applyState(s) {
  state = s
  selectedHandCards = []; selectedAttackCard = null
  renderOpponents()
  renderTable()
  renderHand()
  updateTimer()
}

function renderEnd(results) {
  document.getElementById('endResults').innerHTML = results.map(r => `
    <div class="end-row">
      <span class="end-place">${r.place}</span>
      <span class="end-name">${r.game_name}${r.user_id === myUserId ? ' (вы)' : ''}</span>
      <span class="end-payout">${r.payout > 0 ? '+' + r.payout : r.place === results.length ? 'Дурак' : '0'}</span>
    </div>`).join('')
  document.getElementById('endScreen').classList.add('show')
  const leaveBtn = document.getElementById('btnLeave')
  if (leaveBtn) leaveBtn.style.display = 'none'
}

if (window.gameAPI && tableId && token) {
  window.gameAPI.onEvent(msg => {
    if (msg.type === 'game_state') {
      myUserId = msg.myUserId || myUserId
      state = { ...msg, throwWindowEndsAt: msg.throwWindowEndsAt ?? null }
      const me = state.players.find(p => p.user_id === myUserId)
      document.getElementById('myName').textContent = me?.game_name || ''
      document.getElementById('myPortrait').innerHTML = me ? renderPortrait(me) : ''
      document.getElementById('tbTitle').textContent = `Дурак — ${msg.gameType === 'transfer' ? 'Переводной' : 'Подкидной'}`
      document.getElementById('betInfo').textContent = msg.bet > 0 ? `Банк: ${msg.bet * msg.players.length}` : ''
      selectedHandCards = []; selectedAttackCard = null
      renderOpponents(); renderTable(); renderHand(); updateTimer(); updateMyRole()
    } else if (msg.type === 'hand_update') {
      state.myHand = msg.myHand
      if (msg.players) state.players = msg.players
      if (msg.attackerIdx !== undefined) state.attackerIdx = msg.attackerIdx
      if (msg.defenderIdx !== undefined) state.defenderIdx = msg.defenderIdx
      if (msg.phase) state.phase = msg.phase
      if (msg.passedIds) state.passedIds = msg.passedIds
      if (msg.table !== undefined) state.table = msg.table
      if (msg.deckCount !== undefined) state.deckCount = msg.deckCount
      if (msg.discardCount !== undefined) state.discardCount = msg.discardCount
      if (msg.timerEndsAt !== undefined) state.timerEndsAt = msg.timerEndsAt
      if (msg.throwWindowEndsAt !== undefined) state.throwWindowEndsAt = msg.throwWindowEndsAt
      selectedHandCards = []; selectedAttackCard = null
      renderOpponents(); renderTable(); renderHand(); updateTimer(); updateMyRole()
    } else if (msg.type === 'attack' || msg.type === 'defend' || msg.type === 'throw_in' || msg.type === 'transfer') {
      if (msg.table) state.table = msg.table
      if (msg.user_id === myUserId) {
        if (msg.type === 'attack' && msg.cards) {
          for (const c of msg.cards) removeCardFromHand(c)
        } else if (msg.type === 'defend' && msg.defend_card) {
          removeCardFromHand(msg.defend_card)
        } else if ((msg.type === 'throw_in' || msg.type === 'transfer') && msg.card) {
          removeCardFromHand(msg.card)
        }
      }
      renderTable(); renderHand(); updateButtons()
    } else if (msg.type === 'take' || msg.type === 'round_end') {
      state.table = []; renderTable()
    } else if (msg.type === 'throw_window_start') {
      state.throwWindowEndsAt = Date.now() + msg.seconds * 1000
      updateTimer(); renderHand(); updateButtons()
    } else if (msg.type === 'timer_start') {
      state.timerEndsAt = Date.now() + msg.seconds * 1000
      updateTimer(); renderHand(); updateButtons()
    } else if (msg.type === 'player_exit') {
      if (state && !state.exits?.find(e => e.user_id === msg.user_id)) {
        state.exits = [...(state.exits || []), { user_id: msg.user_id, place: msg.place }]
      }
      renderOpponents()
    } else if (msg.type === 'player_disconnected') {
      const pl = state?.players?.find(pl => pl.user_id === msg.user_id)
      if (pl) { pl.connected = false; renderOpponents() }
    } else if (msg.type === 'player_reconnected') {
      const pl = state?.players?.find(pl => pl.user_id === msg.user_id)
      if (pl) { pl.connected = true; renderOpponents() }
    } else if (msg.type === 'game_over') {
      renderEnd(msg.results)
    } else if (msg.type === 'chat') {
      gcAppendMsg(msg)
    }
  })
  window.gameAPI.connect(tableId, token, srv)
} else {
  document.getElementById('statusMsg').textContent = 'Нет параметров подключения'
}

// ── Game chat ─────────────────────────────────────────────────────────────────
function gcEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}
function gcTime(ts) {
  if (!ts) return ''
  const d = new Date(ts)
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0')
}
function gcRenderText(text) {
  return gcEsc(text)
    .replace(/\*([^*]+)\*/g, '<b>$1</b>')
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#60a5fa">$1</a>')
}

function gcAppendMsg(m) {
  const box = document.getElementById('gcMsgs')
  if (!box) return
  const d = document.createElement('div')
  const ts = `<span class="gc-ts">${gcTime(m.ts)}</span>`
  const isMe = m.user_id === myUserId
  const nameCls = 'gc-name' + (isMe ? ' me' : '')
  const nameSpan = `<span class="${nameCls}">${gcEsc(m.game_name)}</span>`
  const text = m.content || ''

  if (text.startsWith('/me ')) {
    d.className = 'gc-msg rp'
    d.innerHTML = `${ts}${nameSpan} ${gcRenderText(text.slice(4))}`
  } else if (text.startsWith('/do ')) {
    d.className = 'gc-msg do-msg'
    d.innerHTML = `${ts}${gcRenderText(text.slice(4))} — [${gcEsc(m.game_name)}]`
  } else if (text.startsWith('/try ')) {
    d.className = 'gc-msg try-msg'
    const roll = Math.floor(Math.random() * 100) + 1
    const ok = roll >= 50
    const res = ok
      ? `(<span class="gc-success">Успешно, ${roll}/100</span>)`
      : `(<span class="gc-fail">Неуспешно, ${roll}/100</span>)`
    d.innerHTML = `${ts}${nameSpan} ${gcRenderText(text.slice(5))} ${res}`
  } else {
    d.className = 'gc-msg'
    d.innerHTML = `${ts}${nameSpan}: ${gcRenderText(text)}`
  }
  box.appendChild(d)
  if (gcCollapsed) {
    gcUnread++
    const badge = document.getElementById('gcUnreadBadge')
    badge.textContent = gcUnread
    badge.style.display = 'inline-block'
  } else {
    box.scrollTop = box.scrollHeight
  }
}

let gcCollapsed = false
let gcUnread = 0

function gcToggleCollapse() {
  gcCollapsed = !gcCollapsed
  document.getElementById('gameChat').classList.toggle('collapsed', gcCollapsed)
  document.getElementById('gcCollapseBtn').textContent = gcCollapsed ? '▼' : '▲'
  if (!gcCollapsed) {
    gcUnread = 0
    const badge = document.getElementById('gcUnreadBadge')
    badge.style.display = 'none'
    badge.textContent = ''
    setTimeout(() => {
      const box = document.getElementById('gcMsgs')
      if (box) box.scrollTop = box.scrollHeight
    }, 200)
  }
}

function gcSend() {
  const inp = document.getElementById('gcInput')
  const txt = inp.value.trim()
  if (!txt) return
  window.gameAPI?.sendAction('chat', { content: txt })
  inp.value = ''
  gcUpdateCmdBtns()
}

function gcKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); gcSend() }
}

function gcUpdateCmdBtns() {
  const v = document.getElementById('gcInput').value
  document.getElementById('gcBtnMe').classList.toggle('active', v.startsWith('/me '))
  document.getElementById('gcBtnDo').classList.toggle('active', v.startsWith('/do '))
  document.getElementById('gcBtnTry').classList.toggle('active', v.startsWith('/try '))
}

function gcPrependCmd(cmd) {
  const inp = document.getElementById('gcInput')
  const cmds = ['/me ', '/do ', '/try ']
  if (inp.value.startsWith(cmd)) {
    inp.value = inp.value.slice(cmd.length)
  } else {
    const other = cmds.find(c => c !== cmd && inp.value.startsWith(c))
    inp.value = cmd + (other ? inp.value.slice(other.length) : inp.value)
  }
  gcUpdateCmdBtns()
  inp.focus()
  inp.selectionStart = inp.selectionEnd = inp.value.length
}
